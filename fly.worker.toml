# Fly.io config — hpi-worker (persistent ingestion, D004/D009/D116).
# Deploy:  fly deploy --config fly.worker.toml --depot=false
#          fly scale count 1 --config fly.worker.toml
#
# Owns GDELT ingestion off CI (persistent IAD IP clears the 429 that the shared GitHub
# Actions IP hits). worker/tasks/app.py is a plain asyncio interval loop.
#
# Secrets (via `fly secrets set --config fly.worker.toml`):
#   DATABASE_URL       — shared Supabase DB (writes raw/normalized records)
#   OPENAI_API_KEY     — embeddings for the ingested news (else records land un-embedded)
#   SENTRY_DSN         — optional error reporting

app = "hpi-worker"
primary_region = "iad"

[build]
  dockerfile = "docker/Dockerfile.worker"

[env]
  ENVIRONMENT = "production"

# Background worker: NO [http_service]. The schedule lives IN the process (the asyncio
# interval loop, D116), so it must stay running — do not enable auto-stop. Exactly one
# always-on machine owns ingestion; running >1 would double-ingest (harmless dedup, wasted
# calls) so keep the count at 1.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Keep exactly one machine running (persistent — D009: Fly does not sleep it).
# Set after first deploy:  fly scale count 1 --config fly.worker.toml
