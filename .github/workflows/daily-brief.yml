# Daily ingest + brief cadence (DEPLOY_RUNBOOK.md §6).
#
# Two phases across two jobs:
#   (1) `ingest` — scripts/run_ingest.py pulls FRESH government data from live source APIs
#       into raw_records/normalized_records, embeds new chunks, advances cursors, and prunes
#       the hot window (D004, D055). Runs ONCE. Also reconciles migrations first.
#   (2) `brief`  — scripts/run_brief.py synthesizes + evals + publishes ONE desk, fanned out
#       over a per-desk MATRIX so defense/ai/energy generate CONCURRENTLY (D113). Previously
#       all three ran sequentially in a single job and the 45-min ceiling kept cutting the
#       LAST desk (Energy) off (2026-06-29 and 2026-07-01 both lost a desk). Parallel desks
#       each get the full window, so a slow LLM day on one desk can't starve another.
#
# A scheduled run publishes all three desks off the single ingest; a manual workflow_dispatch
# publishes just the chosen desk (the matrix collapses to one entry).
#
# Required repo secrets (gh secret set ...): DATABASE_URL, OPENROUTER_API_KEY,
# OPENAI_API_KEY, SAM_GOV_API_KEY, and optionally ANTHROPIC_API_KEY.

name: Daily Brief

on:
  workflow_dispatch:
    inputs:
      desk:
        description: "Desk to generate"
        default: "defense"
        type: choice
        options: [defense, ai, energy]
      skip_ingest:
        description: "Skip ingestion (regenerate from existing data only)"
        default: false
        type: boolean
  schedule:
    # 06:00 UTC daily (D108). GitHub delays scheduled runs 40–100 min under load (observed:
    # 09:44–10:38 UTC for a "09:00" cron); starting at 06:00 UTC buys a multi-hour buffer so
    # even a delayed run lands before the ~06:00 ET reader window. With the desks now parallel
    # (D113) wall-clock is ingest (~15m) + the slowest single desk (~15m), not the sum.
    - cron: "0 6 * * *"

concurrency:
  group: daily-brief
  cancel-in-progress: false   # never run two brief generations at once

jobs:
  # ── Phase 1: reconcile migrations + ingest fresh source data (once) ──────────────
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      desks: ${{ steps.plan.outputs.desks }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.0"

      - name: Sync workspace
        run: uv sync --all-packages --all-extras

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Reconcile DB migrations (safeguard)
        # Apply any migrations on `main` the remote DB doesn't have yet, BEFORE we ingest or
        # spend on LLM calls — so code that references new schema can't dark the brief.
        # Non-fatal by design: app columns are written defensively (e.g. signal_series is
        # best-effort, D089), so a reconcile hiccup must never block publishing — it warns and
        # proceeds. Uses DATABASE_URL directly (no project link/login). NOTE: `db push` needs a
        # *direct* connection to take its advisory lock; if DATABASE_URL is the transaction-mode
        # pooler this step will warn rather than apply — then add a direct-connection secret for
        # migrations (DEPLOY_RUNBOOK §6).
        continue-on-error: true
        timeout-minutes: 5
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Reconciling migrations against the remote DB before ingest/brief…"
          if printf 'y\n' | supabase db push --db-url "$DATABASE_URL"; then
            echo "Migrations reconciled (or already up to date)."
          else
            echo "::warning::supabase db push did not complete — proceeding (app schema is migration-tolerant). Run 'supabase db push' manually if a required column is missing."
          fi

      - name: Ingest fresh source data
        if: ${{ inputs.skip_ingest != true }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # SAM.gov Opportunities adapter (D105) reads settings.sam_gov_api_key from env.
          # Without this the adapter silently no-ops on every ingest. Set the secret with:
          #   gh secret set SAM_GOV_API_KEY --body '<key>'
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
        # --exclude gdelt: GDELT 429s this shared CI IP (D110/D116); the always-on Fly worker
        # (hpi-worker, persistent IP) owns it and writes to the same DB. Leaving it here would
        # also keep tripping GDELT's shared circuit breaker and block the worker.
        run: uv run python scripts/run_ingest.py --exclude gdelt

      - name: Plan desks
        id: plan
        # Scheduled → all three desks (fanned out in parallel below); a manual dispatch →
        # just the chosen desk. Emitted as a JSON array the matrix reads via fromJSON.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'desks=["defense","ai","energy"]' >> "$GITHUB_OUTPUT"
          else
            echo "desks=[\"${{ inputs.desk || 'defense' }}\"]" >> "$GITHUB_OUTPUT"
          fi

  # ── Phase 2: generate + eval + publish each desk CONCURRENTLY ────────────────────
  brief:
    needs: ingest
    runs-on: ubuntu-latest
    # Per-desk ceiling. A desk = re-rolls + synthesis + eval + analysis grounding. The energy
    # desk (28 items) blew the old 30-min cap on 2026-07-04 in the analysis-grounding gate, which
    # ran ~2·N SEQUENTIAL eval calls each re-sending the full facts block (~12 min tail). D119
    # batched that gate into ONE call, so grounding is now seconds — 35 min gives comfortable
    # headroom (largest desk was ~18 min without the tail). Desks run in parallel, so this is the
    # wall-clock cap for the slowest desk, not the sum.
    timeout-minutes: 35
    strategy:
      fail-fast: false   # one desk failing must NOT cancel the others (Energy independence)
      matrix:
        desk: ${{ fromJSON(needs.ingest.outputs.desks) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.0"

      - name: Sync workspace
        run: uv sync --all-packages --all-extras

      - name: Generate + eval + publish ${{ matrix.desk }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # run_brief.py exit codes (D076): 0=published, 3=clean skip (below the provable-claim
          # floor on a thin day — not an error), other=hard crash. Per-desk job: a clean skip is
          # green (a sparse day is normal); only a real crash goes red (→ email) for THIS desk.
          set +e
          uv run python scripts/run_brief.py --desk "${{ matrix.desk }}"
          code=$?
          set -e
          case "$code" in
            0) verdict="published" ;;
            3) verdict="skipped (below claim floor)" ;;
            *) verdict="CRASHED (exit $code)" ;;
          esac
          echo "- **${{ matrix.desk }}:** $verdict" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ matrix.desk }}: $verdict"
          if [ "$code" != "0" ] && [ "$code" != "3" ]; then
            echo "::error::${{ matrix.desk }} brief crashed (exit $code)"
            exit 1
          fi
          exit 0
