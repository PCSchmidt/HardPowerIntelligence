# Daily ingest + brief cadence (DEPLOY_RUNBOOK.md §6).
#
# Two steps: (1) scripts/run_ingest.py pulls FRESH government data from live source APIs
# into raw_records/normalized_records, embeds new chunks, advances cursors, and prunes the
# hot window (D004, D055); (2) scripts/run_brief.py synthesizes + evals + publishes the
# brief from that fresh data. A scheduled run ingests once, then publishes ALL THREE desks
# (defense/ai/energy); a manual workflow_dispatch publishes just the chosen desk (ad-hoc).
#
# Required repo secrets (gh secret set ...): DATABASE_URL, OPENROUTER_API_KEY,
# OPENAI_API_KEY, and optionally ANTHROPIC_API_KEY.

name: Daily Brief

on:
  workflow_dispatch:
    inputs:
      desk:
        description: "Desk to generate"
        default: "defense"
        type: choice
        options: [defense, ai, energy]
      skip_ingest:
        description: "Skip ingestion (regenerate from existing data only)"
        default: false
        type: boolean
  schedule:
    # 09:00 UTC daily (~5am ET) so the ~15-min ingest+3-desk run finishes before the
    # site's "5:30am ET" promise. Adjust to your cadence (and keep the copy in sync).
    - cron: "0 9 * * *"

concurrency:
  group: daily-brief
  cancel-in-progress: false   # never run two brief generations at once

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.0"

      - name: Sync workspace
        run: uv sync --all-packages --all-extras

      - name: Ingest fresh source data
        if: ${{ inputs.skip_ingest != true }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python scripts/run_ingest.py

      - name: Generate + eval + publish brief(s)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Scheduled run publishes every desk off the single ingest above; a manual
          # dispatch publishes just the chosen desk.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DESKS="defense ai energy"
          else
            DESKS="${{ inputs.desk || 'defense' }}"
          fi
          # run_brief.py exit codes (D076): 0=published, 3=clean skip (below the
          # provable-claim floor on a thin day — not an error), other=hard crash.
          published=""; skipped=""; crashed=""; first=1
          for d in $DESKS; do
            # Space desks apart so we don't burst the provider rate budget (D076).
            if [ "$first" = "0" ]; then sleep 15; fi
            first=0
            echo "::group::brief $d"
            set +e
            uv run python scripts/run_brief.py --desk "$d"
            code=$?
            set -e
            echo "::endgroup::"
            case "$code" in
              0) published="$published $d" ;;
              3) skipped="$skipped $d" ;;
              *) crashed="$crashed $d" ;;
            esac
          done
          {
            echo "## Daily Brief"
            echo "- **published:**${published:- (none)}"
            echo "- **skipped (below claim floor):**${skipped:- (none)}"
            echo "- **crashed:**${crashed:- (none)}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "published:${published:- none} | skipped:${skipped:- none} | crashed:${crashed:- none}"
          # Go red (→ email) only on a genuine break: a desk crashed, or nothing
          # published at all. A sparse desk cleanly skipping is a normal green run.
          if [ -n "$crashed" ]; then
            echo "::error::brief desk(s) crashed:$crashed"
            exit 1
          fi
          if [ -z "$published" ]; then
            echo "::error::no desk published (all desks skipped or empty)"
            exit 1
          fi
          exit 0
