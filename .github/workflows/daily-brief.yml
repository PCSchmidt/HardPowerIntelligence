# Daily ingest + brief cadence (DEPLOY_RUNBOOK.md §6).
#
# Two steps: (1) scripts/run_ingest.py pulls FRESH government data from live source APIs
# into raw_records/normalized_records, embeds new chunks, advances cursors, and prunes the
# hot window (D004, D055); (2) scripts/run_brief.py synthesizes + evals + publishes the
# brief from that fresh data. The cron is still commented by default — enable it once you
# have enough registered sources that a daily run is worth the LLM cost (D006).
#
# Required repo secrets (gh secret set ...): DATABASE_URL, OPENROUTER_API_KEY,
# OPENAI_API_KEY, and optionally ANTHROPIC_API_KEY.

name: Daily Brief

on:
  workflow_dispatch:
    inputs:
      desk:
        description: "Desk to generate"
        default: "defense"
        type: choice
        options: [defense]
      skip_ingest:
        description: "Skip ingestion (regenerate from existing data only)"
        default: false
        type: boolean
  # Enable once enough sources are registered to make a daily run worth the LLM cost:
  # schedule:
  #   - cron: "0 11 * * *"   # 11:00 UTC daily (≈ 6-7am ET); adjust to your cadence

concurrency:
  group: daily-brief
  cancel-in-progress: false   # never run two brief generations at once

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.0"

      - name: Sync workspace
        run: uv sync --all-packages --all-extras

      - name: Ingest fresh source data
        if: ${{ inputs.skip_ingest != true }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python scripts/run_ingest.py

      - name: Generate + eval + publish brief
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python scripts/run_brief.py --desk "${{ inputs.desk || 'defense' }}"
